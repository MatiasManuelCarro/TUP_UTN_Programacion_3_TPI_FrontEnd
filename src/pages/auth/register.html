<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <title>Registro</title>
    <link rel="stylesheet" href="/src/shared.css">
    <link rel="stylesheet" href="/src/register.css">
</head>

<body>
    <header class="site-header">
        <button id="menu-toggle" class="sidebar-toggle">&#9776;</button>
        <a href="/index.html" class="site-header__brand">
            <h1>&#127828; Food Store</h1>
        </a>
        <nav class="site-nav">
            <ul class="site-nav__list">
                <li class="site-nav__item">
                    <a class="site-nav__link" href="/index.html">Volver a la página principal</a>
                </li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <form id="register-form" class="register-form" novalidate>
            <h1>Registro</h1>

            <label for="name">Nombre</label>
            <input id="name" type="text" required />

            <label for="surname">Apellido</label>
            <input id="surname" type="text" required />

            <label for="email">Email</label>
            <input id="email" type="email" required />

            <label for="confirm-email">Repetir Email</label>
            <input id="confirm-email" type="email" required />

            <label for="phone">Celular</label>
            <input id="phone" type="tel" required />

            <label for="password">Contraseña</label>
            <input id="password" type="password" required />
            <div id="error"></div>

            <button type="submit">Registrarme</button>

            <p class="login-link">¿Ya tenés cuenta?
                <a href="/src/pages/auth/login.html">Ingresar</a>
            </p>
        </form>
    </main>

    <script type="module" src="/src/main.ts" defer></script>
    <script type="module" src="/src/pages/auth/register/register.ts"></script>
</body>

</html>
